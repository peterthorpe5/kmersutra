[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kmersutra"
version = "0.1.0"
description = "Outgroup-aware k-mer framework for clade and species-resolved metagenomic detection"
requires-python = ">=3.10"
dependencies = []

[tool.setuptools.packages.find]
where = ["."]
include = ["kmersutra*"]

[tool.nose2]
start-dir = "tests"
